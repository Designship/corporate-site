<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Designship Hero - Kinetic Typography + Glow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #000;
      overflow-x: hidden;
      color: #fff;
    }

    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Background radial gradient light sources */
    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .hero-bg .glow-spot {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.08;
    }

    .hero-bg .glow-spot:nth-child(1) {
      width: 600px;
      height: 600px;
      background: #E91E8C;
      top: 20%;
      left: 10%;
    }

    .hero-bg .glow-spot:nth-child(2) {
      width: 500px;
      height: 500px;
      background: #7B2FBE;
      top: 30%;
      right: 5%;
    }

    .hero-bg .glow-spot:nth-child(3) {
      width: 450px;
      height: 450px;
      background: #304FFE;
      bottom: 10%;
      left: 30%;
    }

    .hero-bg .glow-spot:nth-child(4) {
      width: 400px;
      height: 400px;
      background: #FF1744;
      top: 10%;
      right: 30%;
    }

    .hero-bg .glow-spot:nth-child(5) {
      width: 350px;
      height: 350px;
      background: #FFD600;
      bottom: 20%;
      right: 15%;
    }

    /* Content layer */
    .hero-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    .hero-logo {
      height: 140px;
      width: auto;
      opacity: 0;
    }

    .hero-title {
      font-size: clamp(60px, 15vw, 200px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: 0.05em;
      text-align: center;
      white-space: nowrap;
    }

    .hero-title .char {
      display: inline-block;
      position: relative;
      color: #fff;
      opacity: 0;
      /* Default glow — GSAP will animate the text-shadow */
      text-shadow:
        0 0 10px rgba(233, 30, 140, 0.6),
        0 0 20px rgba(233, 30, 140, 0.4),
        0 0 40px rgba(233, 30, 140, 0.2),
        0 0 80px rgba(233, 30, 140, 0.1);
    }

    .hero-subtitle {
      font-size: clamp(14px, 2vw, 22px);
      font-weight: 400;
      color: #666;
      letter-spacing: 0.15em;
      text-align: center;
      opacity: 0;
      text-shadow:
        0 0 15px rgba(123, 47, 190, 0.3),
        0 0 30px rgba(123, 47, 190, 0.15);
    }

    /* Mobile */
    @media (max-width: 768px) {
      .hero-logo {
        height: 80px;
      }

      .hero-title {
        white-space: normal;
        font-size: clamp(48px, 12vw, 120px);
        padding: 0 16px;
      }

      .hero-content {
        gap: 24px;
      }

      .hero-bg .glow-spot {
        filter: blur(80px);
        opacity: 0.06;
      }

      .hero-bg .glow-spot:nth-child(1) { width: 300px; height: 300px; }
      .hero-bg .glow-spot:nth-child(2) { width: 250px; height: 250px; }
      .hero-bg .glow-spot:nth-child(3) { width: 220px; height: 220px; }
      .hero-bg .glow-spot:nth-child(4) { width: 200px; height: 200px; }
      .hero-bg .glow-spot:nth-child(5) { width: 180px; height: 180px; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <!-- Subtle background glow spots -->
    <div class="hero-bg">
      <div class="glow-spot"></div>
      <div class="glow-spot"></div>
      <div class="glow-spot"></div>
      <div class="glow-spot"></div>
      <div class="glow-spot"></div>
    </div>

    <div class="hero-content">
      <img src="../assets/images/logo-for-black-bg.png" alt="Designship" class="hero-logo">
      <h1 class="hero-title" data-text="産業の未来を拓く"></h1>
      <p class="hero-subtitle">一般社団法人デザインシップ</p>
    </div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
    // Brand glow colors
    const glowColors = [
      { r: 233, g: 30,  b: 140 }, // #E91E8C
      { r: 123, g: 47,  b: 190 }, // #7B2FBE
      { r: 255, g: 23,  b: 68  }, // #FF1744
      { r: 255, g: 214, b: 0   }, // #FFD600
      { r: 48,  g: 79,  b: 254 }, // #304FFE
    ];

    // Build text-shadow string for a given color
    function buildGlow(color, intensity = 1) {
      const { r, g, b } = color;
      return [
        `0 0 ${10 * intensity}px rgba(${r},${g},${b},0.8)`,
        `0 0 ${20 * intensity}px rgba(${r},${g},${b},0.6)`,
        `0 0 ${40 * intensity}px rgba(${r},${g},${b},0.35)`,
        `0 0 ${80 * intensity}px rgba(${r},${g},${b},0.2)`,
        `0 0 ${120 * intensity}px rgba(${r},${g},${b},0.1)`,
      ].join(', ');
    }

    // Split text into individual character spans
    const titleEl = document.querySelector('.hero-title');
    const text = titleEl.getAttribute('data-text');
    const chars = [];

    text.split('').forEach((char, i) => {
      const span = document.createElement('span');
      span.classList.add('char');
      span.textContent = char;
      titleEl.appendChild(span);
      chars.push(span);
    });

    // Entrance animation timeline
    const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

    // Logo fade in
    tl.to('.hero-logo', {
      opacity: 1,
      duration: 1.2,
      y: 0,
      ease: 'power2.out',
    });

    // Characters reveal with stagger
    tl.to(chars, {
      opacity: 1,
      duration: 0.6,
      stagger: 0.08,
      ease: 'power2.out',
    }, '-=0.6');

    // Subtitle fade in
    tl.to('.hero-subtitle', {
      opacity: 1,
      duration: 1,
      ease: 'power2.out',
    }, '-=0.3');

    // Continuous glow animation for each character
    chars.forEach((charEl, i) => {
      // Each character cycles through colors at its own offset
      const colorCount = glowColors.length;
      const cycleDuration = 4; // seconds per full color cycle
      const staggerOffset = i * 0.35; // stagger between characters

      // Create a repeating timeline for each character
      const glowTl = gsap.timeline({
        repeat: -1,
        delay: staggerOffset,
      });

      // Cycle through each color
      for (let c = 0; c < colorCount; c++) {
        const color = glowColors[c];
        const nextColor = glowColors[(c + 1) % colorCount];

        // Animate to this color
        glowTl.to(charEl, {
          duration: cycleDuration / colorCount,
          textShadow: buildGlow(color, 1),
          ease: 'sine.inOut',
        });
      }

      // Also add a subtle pulse to the intensity
      gsap.to(charEl, {
        repeat: -1,
        yoyo: true,
        duration: 1.5 + (i * 0.1),
        delay: staggerOffset,
        textShadow: buildGlow(glowColors[i % colorCount], 1.4),
        ease: 'sine.inOut',
        overwrite: false,
      });
    });

    // Subtle background glow spot animation
    gsap.utils.toArray('.glow-spot').forEach((spot, i) => {
      gsap.to(spot, {
        x: () => gsap.utils.random(-40, 40),
        y: () => gsap.utils.random(-30, 30),
        scale: gsap.utils.random(0.9, 1.15),
        opacity: gsap.utils.random(0.04, 0.1),
        duration: gsap.utils.random(6, 10),
        repeat: -1,
        yoyo: true,
        ease: 'sine.inOut',
        delay: i * 0.8,
      });
    });
  </script>
</body>
</html>

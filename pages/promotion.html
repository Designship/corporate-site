<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --black: #000000;
  --white: #ffffff;
  --gray: #888888;
  --dark-gray: #1a1a1a;
  --magenta: #E91E8C;
}

html { scroll-behavior: smooth; background: var(--black); }

body {
  font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--black);
  color: var(--white);
  line-height: 1.8;
}

::selection { background: var(--magenta); color: var(--white); }
a { color: inherit; text-decoration: none; }

/* Particle canvas */

/* Top bar */
.top-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 16px 24px;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.top-bar a {
  font-size: 13px;
  font-weight: 400;
  color: var(--gray);
  transition: color 0.3s ease;
}
.top-bar a:hover { color: var(--white); }

/* Page layout */
.page-header {
  position: relative;
  z-index: 1;
  padding-top: 80px;
  text-align: left;
  margin-bottom: 64px;
  max-width: 900px;
  margin-left: auto;
  margin-right: auto;
  padding-left: 24px;
  padding-right: 24px;
}

.page-title {
  font-size: clamp(28px, 4vw, 48px);
  font-weight: 700;
  color: var(--white);
  line-height: 1.3;
  text-align: left;
  margin-bottom: 12px;
}

.page-container {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 0 24px 120px;
}

.page-description {
  font-size: clamp(14px, 1.2vw, 16px);
  font-weight: 300;
  color: rgba(255,255,255,0.6);
  line-height: 2;
  max-width: 100%;
  margin: 0 0 0;
  text-align: left;
}

.page-hero-img {
  width: 100%;
  border-radius: 12px;
  margin: 32px 0 48px;
  object-fit: cover;
  max-height: 400px;
}

/* Section heading */
.section-heading {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 24px;
  letter-spacing: -0.02em;
  border-left: 3px solid #E91E8C;
  padding-left: 16px;
}

/* Achievement list — CSS grid with fixed year column (same as gov.html) */
.list-table {
  width: 100%;
  margin-bottom: 64px;
}

.list-row {
  display: grid;
  grid-template-columns: 80px 1fr auto;
  align-items: start;
  padding: 16px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  gap: 0 12px;
}
.list-row:first-child { border-top: 1px solid rgba(255,255,255,0.08); }

.list-row-link {
  display: grid;
  grid-template-columns: 80px 1fr auto;
  align-items: start;
  width: 100%;
  padding: 16px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  color: var(--magenta);
  transition: background 0.2s ease;
  gap: 0 12px;
}
.list-row-link:first-child { border-top: 1px solid rgba(255,255,255,0.08); }
.list-row-link:hover {
  background: rgba(255,255,255,0.08);
}

/* Prevent double borders */
.list-row + .list-row-link,
.list-row-link + .list-row,
.list-row-link + .list-row-link,
.list-row + .list-row {
  border-top: none;
}

.list-year {
  font-size: 14px;
  font-weight: 500;
  color: var(--gray);
  font-variant-numeric: tabular-nums;
}

.list-name {
  font-size: 15px;
  font-weight: 400;
}

.list-row-link .list-name {
  color: var(--magenta);
}

.list-role {
  font-size: 12px;
  font-weight: 400;
  color: var(--gray);
  background: rgba(255,255,255,0.06);
  padding: 3px 10px;
  border-radius: 4px;
  white-space: nowrap;
}

.list-arrow {
  flex-shrink: 0;
  font-size: 14px;
  margin-left: 12px;
  color: var(--magenta);
}

/* Contact */
.contact-block {
  margin-top: 64px;
  padding: 48px;
  background: var(--dark-gray);
  border-radius: 12px;
  text-align: center;
}

.contact-block p {
  font-size: 14px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 16px;
}

.contact-email {
  font-size: clamp(16px, 1.8vw, 22px);
  font-weight: 600;
  color: var(--magenta);
  transition: opacity 0.3s ease;
}
.contact-email:hover { opacity: 0.7; }

@media (max-width: 768px) {
  .list-row, .list-row-link { grid-template-columns: 60px 1fr; gap: 4px 12px; }
  .list-role { grid-column: 2; justify-self: start; }
  .contact-block { padding: 32px 20px; }
}
</style>
</head>
